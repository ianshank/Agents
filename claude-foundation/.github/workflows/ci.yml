# CI for the extracted claude-foundation repository.
# NOTE: inert while this directory is staged inside ianshank/Agents (GitHub only
# runs workflows from the repository root); becomes active after extraction.
name: foundation CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  merge-gate:
    name: merge gate (deterministic)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip "setuptools>=68"
      - run: pip install -e ".[dev]"
      - run: ruff check tools tests hooks
      - run: ruff format --check tools tests hooks
      - run: mypy tools
      - run: mypy hooks
      - run: mypy tests
      - run: python -m foundation_tools.validate --root .
      - run: python -m foundation_tools.scan --root .
      - run: python -m pytest --cov --cov-report=term-missing
      - name: Official plugin validation + install smoke
        run: |
          npm install -g @anthropic-ai/claude-code
          bash tests/smoke/install_smoke.sh

  release-gate:
    # Behavioral evals gate RELEASES, not merges (ADR 0003): run on tags and
    # nightly; requires grading.json from a skill-creator eval run.
    name: release gate (behavioral evals)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - run: python -m foundation_tools.eval_gate --root . --require-grading
