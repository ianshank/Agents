  <rect width="1400" height="1660" fill="#FFFFFF"/>

  <text x="40" y="44" font-size="24" font-weight="700" fill="#0F172A">LLM Evaluation Harness — C4 Architecture</text>
  <text x="40" y="68" font-size="13" fill="#64748B">Context · Container · Component views of the langfuse-eval-harness package</text>

  <!-- ============ LEVEL 1: CONTEXT ============ -->
  <text x="40" y="104" font-size="14" font-weight="700" letter-spacing="1" fill="#1168BD">LEVEL 1 · SYSTEM CONTEXT</text>

  <g>
    <rect x="70" y="150" width="200" height="92" rx="8" fill="#08427B"/>
    <text x="84" y="178" font-size="14" font-weight="700" fill="#fff">ML / Eval Engineer</text>
    <text x="84" y="196" font-size="11" font-style="italic" fill="#CBD5E1">[Person]</text>
    <text x="84" y="216" font-size="11" fill="#E2E8F0">Authors datasets, scorers,</text>
    <text x="84" y="231" font-size="11" fill="#E2E8F0">configs</text>
  </g>
  <g>
    <rect x="70" y="300" width="200" height="92" rx="8" fill="#08427B"/>
    <text x="84" y="328" font-size="14" font-weight="700" fill="#fff">CI / Platform Eng</text>
    <text x="84" y="346" font-size="11" font-style="italic" fill="#CBD5E1">[Person]</text>
    <text x="84" y="366" font-size="11" fill="#E2E8F0">Runs evals as a release</text>
    <text x="84" y="381" font-size="11" fill="#E2E8F0">gate</text>
  </g>

  <g>
    <rect x="560" y="210" width="300" height="120" rx="8" fill="#1168BD"/>
    <text x="576" y="244" font-size="16" font-weight="700" fill="#fff">LLM Evaluation Harness</text>
    <text x="576" y="264" font-size="11" font-style="italic" fill="#CBD5E1">[Software System]</text>
    <text x="576" y="288" font-size="11.5" fill="#E2E8F0">Config-driven, pluggable evaluation</text>
    <text x="576" y="305" font-size="11.5" fill="#E2E8F0">and quality gating over Langfuse</text>
  </g>

  <g>
    <rect x="1130" y="120" width="210" height="96" rx="8" fill="#8A8A8A"/>
    <text x="1144" y="148" font-size="14" font-weight="700" fill="#fff">Langfuse</text>
    <text x="1144" y="166" font-size="11" font-style="italic" fill="#EEE">[External System]</text>
    <text x="1144" y="186" font-size="11" fill="#F5F5F5">Datasets, traces, scores,</text>
    <text x="1144" y="201" font-size="11" fill="#F5F5F5">dashboards</text>
  </g>
  <g>
    <rect x="1130" y="246" width="210" height="96" rx="8" fill="#8A8A8A"/>
    <text x="1144" y="274" font-size="14" font-weight="700" fill="#fff">Amazon Bedrock</text>
    <text x="1144" y="292" font-size="11" font-style="italic" fill="#EEE">[External System]</text>
    <text x="1144" y="312" font-size="11" fill="#F5F5F5">Judge + application model</text>
    <text x="1144" y="327" font-size="11" fill="#F5F5F5">inference</text>
  </g>
  <g>
    <rect x="1130" y="372" width="210" height="92" rx="8" fill="#8A8A8A"/>
    <text x="1144" y="400" font-size="14" font-weight="700" fill="#fff">System-under-test</text>
    <text x="1144" y="418" font-size="11" font-style="italic" fill="#EEE">[External System]</text>
    <text x="1144" y="438" font-size="11" fill="#F5F5F5">The LLM app being</text>
    <text x="1144" y="453" font-size="11" fill="#F5F5F5">evaluated</text>
  </g>

  <path d="M270,196 L556,250" fill="none" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="300" y="210" font-size="10" fill="#475569">authors config, runs</text>
  <path d="M270,346 L556,300" fill="none" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="300" y="345" font-size="10" fill="#475569">runs in CI</text>
  <path d="M860,244 L1126,176" fill="none" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="888" y="206" font-size="10" fill="#475569">datasets / scores [SDK]</text>
  <path d="M860,275 L1126,292" fill="none" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="902" y="270" font-size="10" fill="#475569">judge [PrivateLink]</text>
  <path d="M860,308 L1126,410" fill="none" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="905" y="375" font-size="10" fill="#475569">invokes</text>

  <!-- ============ LEVEL 2: CONTAINER ============ -->
  <text x="40" y="524" font-size="14" font-weight="700" letter-spacing="1" fill="#1168BD">LEVEL 2 · CONTAINER (inside the harness)</text>
  <rect x="50" y="545" width="1010" height="455" rx="10" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="7 5"/>
  <text x="66" y="568" font-size="12" font-weight="700" fill="#475569">LLM Evaluation Harness</text>

  <g><rect x="80" y="595" width="260" height="92" rx="8" fill="#1168BD"/>
    <text x="94" y="623" font-size="14" font-weight="700" fill="#fff">CLI</text>
    <text x="94" y="641" font-size="11" font-style="italic" fill="#CBD5E1">[Python · argparse]</text>
    <text x="94" y="661" font-size="11" fill="#E2E8F0">run / list-plugins; CI exit codes</text>
  </g>
  <g><rect x="370" y="595" width="300" height="92" rx="8" fill="#1168BD"/>
    <text x="384" y="623" font-size="14" font-weight="700" fill="#fff">Config Loader</text>
    <text x="384" y="641" font-size="11" font-style="italic" fill="#CBD5E1">[Python · pydantic / yaml]</text>
    <text x="384" y="661" font-size="11" fill="#E2E8F0">migrate &#8594; interpolate &#8594; validate</text>
  </g>
  <g><rect x="700" y="595" width="320" height="92" rx="8" fill="#1168BD"/>
    <text x="714" y="623" font-size="14" font-weight="700" fill="#fff">Plugin Registries</text>
    <text x="714" y="641" font-size="11" font-style="italic" fill="#CBD5E1">[Python]</text>
    <text x="714" y="661" font-size="11" fill="#E2E8F0">dynamic discovery + name aliases</text>
  </g>

  <g><rect x="80" y="715" width="260" height="92" rx="8" fill="#1168BD"/>
    <text x="94" y="743" font-size="14" font-weight="700" fill="#fff">Eval Engine</text>
    <text x="94" y="761" font-size="11" font-style="italic" fill="#CBD5E1">[Python]</text>
    <text x="94" y="781" font-size="10.5" fill="#E2E8F0">load&#8594;run&#8594;score&#8594;aggregate&#8594;emit</text>
  </g>
  <g><rect x="370" y="715" width="300" height="92" rx="8" fill="#1168BD"/>
    <text x="384" y="743" font-size="14" font-weight="700" fill="#fff">Quality Gate</text>
    <text x="384" y="761" font-size="11" font-style="italic" fill="#CBD5E1">[Python]</text>
    <text x="384" y="781" font-size="11" fill="#E2E8F0">threshold / baseline pass-fail</text>
  </g>
  <g><rect x="700" y="715" width="320" height="92" rx="8" fill="#1168BD"/>
    <text x="714" y="743" font-size="14" font-weight="700" fill="#fff">Langfuse Client</text>
    <text x="714" y="761" font-size="11" font-style="italic" fill="#CBD5E1">[Python adapter]</text>
    <text x="714" y="781" font-size="11" fill="#E2E8F0">Null (offline) / SDK (prod)</text>
  </g>

  <g><rect x="80" y="835" width="590" height="100" rx="8" fill="#438DD5"/>
    <text x="94" y="863" font-size="14" font-weight="700" fill="#fff">Component Plugins</text>
    <text x="94" y="881" font-size="11" font-style="italic" fill="#EAF2FB">[scorers · datasets · targets · sinks · judges]</text>
    <text x="94" y="901" font-size="11" fill="#EAF2FB">built-ins + third-party via entry points</text>
    <text x="94" y="918" font-size="11" fill="#EAF2FB">(detailed in Level 3)</text>
  </g>

  <g><rect x="1100" y="560" width="240" height="78" rx="8" fill="#8A8A8A"/>
    <text x="1114" y="588" font-size="13" font-weight="700" fill="#fff">eval config</text>
    <text x="1114" y="606" font-size="11" font-style="italic" fill="#EEE">[YAML, versioned]</text>
    <text x="1114" y="626" font-size="11" fill="#F5F5F5">${ENV} interpolated</text>
  </g>
  <g><rect x="1100" y="668" width="240" height="70" rx="8" fill="#8A8A8A"/>
    <text x="1114" y="696" font-size="13" font-weight="700" fill="#fff">Langfuse</text>
    <text x="1114" y="716" font-size="11" fill="#F5F5F5">datasets / scores</text>
  </g>
  <g><rect x="1100" y="768" width="240" height="70" rx="8" fill="#8A8A8A"/>
    <text x="1114" y="796" font-size="13" font-weight="700" fill="#fff">Amazon Bedrock</text>
    <text x="1114" y="816" font-size="11" fill="#F5F5F5">judge inference</text>
