    <text x="576" y="1278" font-size="11" font-style="italic" fill="#CBD5E1">[Python]</text>
    <text x="576" y="1298" font-size="11" fill="#E2E8F0">run loop, sampling, aggregation;</text>
    <text x="576" y="1314" font-size="11" fill="#E2E8F0">deterministic via injected rng/clock</text>
  </g>

  <g><rect x="90" y="1150" width="240" height="96" rx="8" fill="#438DD5"/>
