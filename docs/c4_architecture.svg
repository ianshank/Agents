    <text x="1084" y="1196" font-size="10.5" font-style="italic" fill="#EAF2FB">exact · regex · contains ·</text>
    <text x="1084" y="1211" font-size="10.5" font-style="italic" fill="#EAF2FB">json_keys · llm_judge</text>
    <text x="1084" y="1231" font-size="11" fill="#EAF2FB">score() &#8594; ScoreResult</text>
  </g>
  <g><rect x="1070" y="1290" width="250" height="96" rx="8" fill="#438DD5"/>
    <text x="1084" y="1318" font-size="13" font-weight="700" fill="#fff">Judges</text>
    <text x="1084" y="1336" font-size="11" font-style="italic" fill="#EAF2FB">mock (offline) · bedrock</text>
    <text x="1084" y="1356" font-size="11" fill="#EAF2FB">evaluate(prompt) &#8594; verdict</text>
  </g>
  <g><rect x="560" y="1410" width="280" height="92" rx="8" fill="#438DD5"/>
    <text x="576" y="1438" font-size="13" font-weight="700" fill="#fff">Result Sinks</text>
    <text x="576" y="1456" font-size="11" font-style="italic" fill="#EAF2FB">console · json_file · langfuse</text>
    <text x="576" y="1476" font-size="11" fill="#EAF2FB">emit(RunResult)</text>
  </g>
  <g><rect x="900" y="1410" width="230" height="92" rx="8" fill="#438DD5"/>
    <text x="914" y="1438" font-size="13" font-weight="700" fill="#fff">Quality Gate</text>
    <text x="914" y="1456" font-size="11" font-style="italic" fill="#EAF2FB">config rules</text>
    <text x="914" y="1476" font-size="11" fill="#EAF2FB">aggregate &#8594; pass / fail</text>
  </g>
  <g><rect x="290" y="1410" width="230" height="92" rx="8" fill="#85BBF0"/>
