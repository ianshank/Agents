  <!-- ============ LEVEL 3: COMPONENT ============ -->
  <text x="40" y="1064" font-size="14" font-weight="700" letter-spacing="1" fill="#1168BD">LEVEL 3 · COMPONENT (Eval Engine + plugin ecosystem)</text>
  <rect x="50" y="1085" width="1300" height="505" rx="10" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="7 5"/>
  <text x="66" y="1108" font-size="12" font-weight="700" fill="#475569">Eval Engine boundary</text>

  <g><rect x="560" y="1230" width="280" height="100" rx="8" fill="#1168BD"/>
