    <text x="104" y="1216" font-size="11" fill="#EAF2FB">load() &#8594; EvalItem[]</text>
  </g>
  <g><rect x="90" y="1290" width="240" height="96" rx="8" fill="#438DD5"/>
    <text x="104" y="1318" font-size="13" font-weight="700" fill="#fff">Target Runners</text>
    <text x="104" y="1336" font-size="11" font-style="italic" fill="#EAF2FB">echo · callable (dynamic import)</text>
    <text x="104" y="1356" font-size="11" fill="#EAF2FB">run(item) &#8594; TargetOutput</text>
  </g>
  <g><rect x="1070" y="1150" width="250" height="100" rx="8" fill="#438DD5"/>
