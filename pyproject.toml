[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "langfuse-eval-harness"
version = "1.0.0"
description = "Dynamic, modular, backwards-compatible enterprise LLM evaluation harness with first-class Langfuse integration."
requires-python = ">=3.10"
dependencies = [
    "pyyaml>=6",
    "pydantic>=2",
]

[project.optional-dependencies]
langfuse = ["langfuse>=2"]
bedrock = ["boto3>=1.34"]
openai = ["openai>=1.0.0", "tenacity>=8.0.0"]
dev = ["pytest>=8", "pytest-cov>=5", "mypy", "ruff", "jsonschema>=4.0"]

[project.scripts]
eval-harness = "eval_harness.cli:main"

# Third-party plugins register themselves via this entry-point group.
# [project.entry-points."eval_harness.plugins"]
# my_scorers = "my_pkg.scorers:register"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]
