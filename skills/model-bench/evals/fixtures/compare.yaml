schema_version: "1.0"

# Deterministic multi-model comparison fixture (F-024) — two echo "models" over a
# tiny inline dataset, scored by exact_match. Offline and reproducible; swap the
# echo targets for `type: model` (F-027) to benchmark real models.

run:
  name: "model-bench-compare"
  seed: 7

dataset:
  type: inline
  params:
    items:
      - id: "1"
        inputs: { good: "x", bad: "y" }
        expected: "x"

target:
  type: echo
  params: {}

scorers:
  - type: exact_match
    params: {}

comparison:
  baseline: "good-model"
  models:
    - name: "good-model"
      target: { type: echo, params: { output_key: "good" } }
    - name: "bad-model"
      target: { type: echo, params: { output_key: "bad" } }
