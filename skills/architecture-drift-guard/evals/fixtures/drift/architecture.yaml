schema_version: "1.0.0"
root_packages: [driftpkg]
# Resolved relative to this manifest's directory (where driftpkg lives).
sys_path: ["."]
components:
  api: [driftpkg.api]
  core: [driftpkg.core]
# Only the api -> core edge is declared; the code also has core -> api, which is
# the undocumented drift the gate must catch.
dependencies:
  api: [core]
