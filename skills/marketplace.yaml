# Skill Marketplace registry.
#
# A centralized, schema-validated index of community-contributed skills. Each
# entry's `version` must match the SKILL.md frontmatter `version` (semver), and
# every registered skill must pass structural validation (scripts/validate_skill.py).
# Validate with: python scripts/skill_marketplace.py validate
registry_version: 1.0.0
skills:
  - name: openai-judge
    version: 1.1.0
    path: skills/openai-judge
    description: LLM-as-a-judge evaluations over OpenAI-compatible APIs.
    compatibility: python>=3.10
  - name: architecture-drift-guard
    version: 1.0.0
    path: skills/architecture-drift-guard
    description: Detect and block architecture drift in CI against a declared C4 component model.
    compatibility: python>=3.10, grimp, pyyaml
  - name: eval-corpus-forge
    version: 1.0.0
    path: skills/eval-corpus-forge
    description: Build, validate, and package reusable evaluation datasets for agent and LLM systems.
    compatibility: python>=3.10
  - name: model-bench
    version: 1.0.0
    path: skills/model-bench
    description: Benchmark and A/B-test multiple LLMs on one dataset (multi-model comparison + A/B campaigns).
    compatibility: python>=3.10, langfuse-eval-harness
  - name: project-setup
    version: 1.0.0
    path: skills/project-setup
    description: Generate a deterministic, self-documenting Makefile for a Python project from its detected toolchain.
    compatibility: python>=3.10 (tomli on 3.10)
  - name: quality-gate
    version: 1.0.0
    path: skills/quality-gate
    description: Generate a deterministic quality-gate shell script (lint + type + test + coverage) that CI and make check both call.
    compatibility: python>=3.10 (tomli on 3.10)
  - name: deploy
    version: 1.0.0
    path: skills/deploy
    description: Generate a safety-railed deployment script (strict mode, dry-run, confirm gate, rollback, health check).
    compatibility: python>=3.10
