# Runs the staged claude-foundation suite from the repository root.
# The staging tree ships its own workflow (claude-foundation/.github/workflows/ci.yml),
# but GitHub only runs workflows from the repository root, so that copy is inert until
# extraction (ADR 0017). Without this job the foundation's tests and 85% coverage gate
# are enforced by no active CI. Delete this file in the same PR that removes the
# claude-foundation/ staging directory post-extraction.
#
# Scope: the deterministic Python gates only (lint, format, types, validators, tests).
# The npm/claude-code install smoke and the behavioral release gate stay in the staging
# workflow — they belong to the extracted repository's release process, not to merges here.
name: claude-foundation CI (staging)

on:
  push:
    branches: [main]
    paths: ["claude-foundation/**", ".github/workflows/claude-foundation-ci.yml"]
  pull_request:
    paths: ["claude-foundation/**", ".github/workflows/claude-foundation-ci.yml"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: claude-foundation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: claude-foundation
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip "setuptools>=68"
      - run: pip install -e ".[dev]"
      - run: ruff check tools tests hooks
      - run: ruff format --check tools tests hooks
      - run: mypy tools
      - run: mypy hooks
      - run: python -m foundation_tools.validate --root .
      - run: python -m foundation_tools.scan --root .
      - run: python -m pytest --cov --cov-report=term-missing
