name: agent-core CI

on:
  push:
    branches: [main]
    paths:
      - "agent-core/**"
      - ".github/workflows/agent-core-ci.yml"
      - ".github/actions/run-quality-gate/**"
  pull_request:
    paths:
      - "agent-core/**"
      - ".github/workflows/agent-core-ci.yml"
      - ".github/actions/run-quality-gate/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: agent-core-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    env:
      HYPOTHESIS_PROFILE: ci
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      # Delegate to the generated package gate so CI runs the exact same steps as local
      # `make -C agent-core check` -> agent-core/scripts/quality-gate.sh all (ADR 0021).
      - uses: ./.github/actions/run-quality-gate
        with:
          python-version: ${{ matrix.python-version }}
          working-directory: agent-core
          install: pip install -e ".[dev]"
          check: make check
