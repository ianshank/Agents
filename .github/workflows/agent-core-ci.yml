name: agent-core CI

on:
  push:
    branches: [main]
    paths: ["agent-core/**", ".github/workflows/agent-core-ci.yml"]
  pull_request:
    paths: ["agent-core/**", ".github/workflows/agent-core-ci.yml"]

permissions:
  contents: read

concurrency:
  group: agent-core-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-core
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    env:
      HYPOTHESIS_PROFILE: ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip "setuptools>=68"
      - run: pip install -e ".[dev]"
      - run: ruff check agent_core tests
      - run: ruff format --check agent_core tests
      - run: mypy agent_core
      - run: python -m pytest --cov --cov-report=term-missing
