name: flow-corpus CI

on:
  push:
    branches: [main]
    paths:
      - "flow-protocol/**"
      - "flow-corpus/**"
      - ".github/workflows/flow-corpus-ci.yml"
      - ".github/actions/run-quality-gate/**"
  pull_request:
    paths:
      - "flow-protocol/**"
      - "flow-corpus/**"
      - ".github/workflows/flow-corpus-ci.yml"
      - ".github/actions/run-quality-gate/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flow-corpus-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flow-protocol:
    name: flow-protocol py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    env:
      HYPOTHESIS_PROFILE: ci
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      # Delegate to the generated package gate so CI runs the exact same steps as local
      # `make -C flow-protocol check` -> flow-protocol/scripts/quality-gate.sh all (ADR 0021).
      - uses: ./.github/actions/run-quality-gate
        with:
          python-version: ${{ matrix.python-version }}
          working-directory: flow-protocol
          install: pip install -e ".[dev]"
          check: make check

  flow-corpus:
    name: flow-corpus py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    env:
      HYPOTHESIS_PROFILE: ci
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      # Delegate to the generated package gate so CI runs the exact same steps as local
      # `make -C flow-corpus check` -> flow-corpus/scripts/quality-gate.sh all (ADR 0021). The
      # install now uses flow-corpus's own pinned [dev] extra (ruff==0.15.20, mypy==2.1.0)
      # instead of a separate unpinned `pip install ruff mypy` -- closing the version-drift gap
      # the unpinned install had against the rest of the fleet.
      - uses: ./.github/actions/run-quality-gate
        with:
          python-version: ${{ matrix.python-version }}
          working-directory: flow-corpus
          install: pip install -e ../agent-core -e ../flow-protocol -e ".[dev]"
          check: make check
