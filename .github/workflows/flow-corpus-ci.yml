name: flow-corpus CI

on:
  push:
    branches: [main]
    paths:
      - "flow-protocol/**"
      - "flow-corpus/**"
      - ".github/workflows/flow-corpus-ci.yml"
  pull_request:
    paths:
      - "flow-protocol/**"
      - "flow-corpus/**"
      - ".github/workflows/flow-corpus-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flow-corpus-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flow-protocol:
    name: flow-protocol py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flow-protocol
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    env:
      HYPOTHESIS_PROFILE: ci
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip "setuptools>=68"
      - run: pip install -e ".[dev]"
      - run: ruff check flow_protocol tests
      - run: ruff format --check flow_protocol tests
      - run: mypy flow_protocol
      - run: python -m pytest --cov --cov-report=term-missing

  flow-corpus:
    name: flow-corpus py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    env:
      HYPOTHESIS_PROFILE: ci
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip "setuptools>=68"
      # flow-corpus depends on flow-protocol + agent-core (installed editable from the repo).
      - run: pip install -e ./agent-core -e ./flow-protocol -e ./flow-corpus
      - run: pip install pytest pytest-cov hypothesis ruff mypy
      - run: ruff check flow_corpus tests
        working-directory: flow-corpus
      - run: ruff format --check flow_corpus tests
        working-directory: flow-corpus
      - run: mypy flow_corpus
        working-directory: flow-corpus
      - run: python -m pytest --cov --cov-report=term-missing
        working-directory: flow-corpus
