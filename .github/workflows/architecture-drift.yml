name: architecture drift

# Dogfoods skills/architecture-drift-guard on this repo: the actual import graph
# (eval_harness + agent_core) is diffed against architecture.yaml, and the
# committed architecture.mmd is checked for freshness. Both gates are
# deterministic code — no model in the decision path.

on:
  push:
    branches: [main]
    paths:
      - "src/eval_harness/**"
      - "agent-core/**"
      - "architecture.yaml"
      - "architecture.mmd"
      - "skills/architecture-drift-guard/scripts/**"
      - ".github/workflows/architecture-drift.yml"
  pull_request:
    paths:
      - "src/eval_harness/**"
      - "agent-core/**"
      - "architecture.yaml"
      - "architecture.mmd"
      - "skills/architecture-drift-guard/scripts/**"
      - ".github/workflows/architecture-drift.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: architecture-drift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift:
    name: architecture drift + freshness
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      # The pinned grimp comes from the 'archguard' extra. Both roots
      # (eval_harness, agent_core) are made importable by the manifest's
      # sys_path (./src, ./agent-core) — no separate install needed.
      - run: pip install -e ".[archguard]"
      # Drift gate: undocumented component edge => non-zero exit.
      - run: python skills/architecture-drift-guard/scripts/drift_check.py --manifest architecture.yaml
      # Freshness gate: committed diagram must match the manifest.
      - run: python skills/architecture-drift-guard/scripts/mermaid_gen.py --manifest architecture.yaml --check -o architecture.mmd
