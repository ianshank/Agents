name: behavioral-regression CI

on:
  push:
    branches: [main]
    paths:
      - "behavioral-regression/**"
      - "agent-core/**"
      - "flow-protocol/**"
      - "flow-corpus/**"
      - ".github/workflows/behavioral-regression-ci.yml"
  pull_request:
    paths:
      - "behavioral-regression/**"
      - "agent-core/**"
      - "flow-protocol/**"
      - "flow-corpus/**"
      - ".github/workflows/behavioral-regression-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: behavioral-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  behavioral-regression:
    name: behavioral-regression py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    env:
      HYPOTHESIS_PROFILE: ci
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip "setuptools>=68"
      # behavioral-regression depends on agent-core + flow-protocol + flow-corpus
      # (installed editable from the repo). It never imports eval_harness.
      - run: pip install -e ./agent-core -e ./flow-protocol -e ./flow-corpus -e ./behavioral-regression
      - run: pip install pytest pytest-cov hypothesis ruff mypy
      - run: ruff check behavioral_regression tests
        working-directory: behavioral-regression
      - run: ruff format --check behavioral_regression tests
        working-directory: behavioral-regression
      - run: mypy behavioral_regression
        working-directory: behavioral-regression
      - run: python -m pytest --cov --cov-report=term-missing
        working-directory: behavioral-regression

  feature-validation:
    name: F-016 offline validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip "setuptools>=68"
      - run: pip install -e ./agent-core -e ./flow-protocol -e ./flow-corpus -e ./behavioral-regression
      - run: python scripts/validations/F_016.py
