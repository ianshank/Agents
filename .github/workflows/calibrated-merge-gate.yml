name: calibrated merge gate

# Default-OFF (see ADR 0005). Auto-merge happens ONLY when the repo variable
# ENABLE_CALIBRATED_AUTOMERGE == 'true' AND a populated outcome store exists.
# With no store every domain cold-starts to ESCALATE, so this workflow is inert
# until a human enables it and audit data accumulates.

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: merge-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: calibrated merge decision
    # Inert by default: the job only runs once a human enables the gate AND wires
    # the real upstream inputs (mech_pass / touches_protected / raw_confidence /
    # domain + a populated store). Until then it is skipped (neutral), never
    # failing PRs. See ADR 0005.
    if: ${{ vars.ENABLE_CALIBRATED_AUTOMERGE == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: agent-core
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip "setuptools>=68"
      - run: pip install -e .
      # Inputs (mech_pass / touches_protected / raw_confidence / domain) and the
      # outcome store are produced upstream once seeding is implemented (ADR 0005
      # seam). Until then STORE points at a (likely absent) file => cold start.
      - name: Decide
        id: decide
        env:
          STORE: ${{ vars.MERGE_GATE_STORE || 'merge_outcomes.jsonl' }}
          DOMAIN: ${{ vars.MERGE_GATE_DOMAIN || 'unknown' }}
        run: |
          set +e
          python -m agent_core.merge_gate_ci --store "$STORE" --domain "$DOMAIN" \
            --audit-log merge_decisions.jsonl
          rc=$?
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          # Exit-code contract: 0 AUTO_MERGE, 10 ESCALATE, 20 REJECT,
          # 2 usage error, 1 unexpected internal error. Only the two non-failing
          # decisions (AUTO_MERGE / ESCALATE) pass the gate; REJECT *and* any
          # error code fail it, so an internal or usage error can never be
          # mistaken for success and silently bypass the gate.
          case "$rc" in
            0 | 10) exit 0 ;;
            *) exit 1 ;;
          esac
      - name: Auto-merge (gated, default-off)
        if: steps.decide.outputs.rc == '0' && vars.ENABLE_CALIBRATED_AUTOMERGE == 'true'
        run: echo "AUTO_MERGE — enabling merge would happen here (human-enabled)."

  # F-035 shadow mode (ADR 0005 soak, ADR 0018 persistence): a log-only
  # decision on EVERY PR. It cannot merge, approve, or block — all three
  # decision exit codes (0 AUTO_MERGE / 10 ESCALATE / 20 REJECT) map to job
  # success; only internal/usage errors (1/2) fail. Store sync here is
  # READ-ONLY (pull; never push): pull_request tokens are read-only for fork
  # PRs and a PR-time job has nothing legitimate to persist.
  shadow:
    name: shadow merge-gate decision (log-only)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
          fetch-depth: 0  # base diff + regression-gate baseline worktree
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip "setuptools>=68"
      - run: pip install -e "./agent-core"
      # regression_gate runs the offline ROOT suite in both trees; it needs the
      # same extras quality-gates installs (dev alone cannot collect the suite).
      - run: pip install -e ".[dev,langfuse,openai,archguard,parquet]"
      - name: Sync store (read-only pull; tolerate failure -> cold start)
        run: |
          set +e
          python -m agent_core.store_sync pull --store merge_outcomes.jsonl --repo-dir .
          rc=$?
          if [ "$rc" -ne 0 ]; then
            echo "::warning::store pull rc=$rc — deciding over an empty store (cold start)"
          fi
          exit 0
      - name: Changed files vs base
        run: |
          git diff --name-only "origin/${{ github.base_ref }}...HEAD" > changed_files.txt
          cat changed_files.txt
      # mech_pass is computed honestly but not wastefully: the regression gate
      # measures only src/tests (lint) + tests/ (pytest). If the PR touches
      # none of those (nor scripts/ or pyproject.toml, which can change what
      # they mean), baseline == worktree on the measured surface and the gate
      # trivially passes — skipping it and asserting pass is equivalent.
      # rc 1 (net-new findings) and rc 2 (config error) both map to
      # --no-mech-pass: an unknown mechanical state is a failure (fail-safe).
      - name: Mechanical result (regression gate, skipped when unaffected)
        id: mech
        run: |
          set +e
          if grep -qE '^(src/|tests/|scripts/|pyproject\.toml$)' changed_files.txt; then
            python scripts/regression_gate.py \
              --base-ref "origin/${{ github.base_ref }}" \
              --report-path regression_report.json
            echo "rc=$?" >> "$GITHUB_OUTPUT"
          else
            echo "regression gate skipped: no measured path touched (equivalent to pass)"
            echo "rc=0" >> "$GITHUB_OUTPUT"
          fi
          exit 0
      - name: Compose change context
        env:
          BASE_REF: origin/${{ github.base_ref }}
        run: |
          MECH_FLAG=--no-mech-pass
          [ "${{ steps.mech.outputs.rc }}" = "0" ] && MECH_FLAG=--mech-pass
          python scripts/merge_gate_context.py "$MECH_FLAG" --output context.json
          cat context.json
      - name: Shadow decision (log-only; decisions 0/10/20 all succeed)
        id: decide
        run: |
          set +e
          python -m agent_core.merge_gate_ci --store merge_outcomes.jsonl \
            --context context.json --audit-log merge_decisions.jsonl \
            | tee decision_agent.txt
          rc=$?
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          case "$rc" in
            0 | 10 | 20) exit 0 ;;
            *) exit 1 ;;
          esac
      # Second, log-only decision against human/<domain> — the namespace where
      # audited records actually accumulate (ADR 0018 §5). Agent domains stay
      # in cold-start ESCALATE until an agent-confidence artifact exists, so
      # this is what exercises the calibrator/tau/health path during the soak.
      - name: Observability decision (human/<domain>, log-only)
        if: always()
        run: |
          set +e
          jq '.domain = "human/" + .domain' context.json > context_human.json
          python -m agent_core.merge_gate_ci --store merge_outcomes.jsonl \
            --context context_human.json | tee decision_human.txt
          exit 0
      - name: Step summary
        if: always()
        run: |
          {
            echo "## Shadow merge-gate decision"
            echo '```'
            echo "agent domain : $(grep -m1 '^DECISION=' decision_agent.txt || echo 'unavailable')"
            echo "human domain : $(grep -m1 '^DECISION=' decision_human.txt || echo 'unavailable')"
            echo "mech rc      : ${{ steps.mech.outputs.rc }}"
            echo '```'
            echo "### Store record counts (per domain, per label source)"
            echo '```json'
            python -m agent_core.store_sync stats --store merge_outcomes.jsonl || echo '{}'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
