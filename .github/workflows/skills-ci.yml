name: skills CI

on:
  push:
    branches: [main]
    paths:
      - "skills/eval-corpus-forge/**"
      - "skills/architecture-drift-guard/**"
      - "skills/openai-judge/**"
      - "skills/model-bench/**"
      - "skills/project-setup/**"
      - "skills/quality-gate/**"
      - "skills/deploy/**"
      - ".github/workflows/skills-ci.yml"
  pull_request:
    paths:
      - "skills/eval-corpus-forge/**"
      - "skills/architecture-drift-guard/**"
      - "skills/openai-judge/**"
      - "skills/model-bench/**"
      - "skills/project-setup/**"
      - "skills/quality-gate/**"
      - "skills/deploy/**"
      - ".github/workflows/skills-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: skills-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eval-corpus-forge:
    name: eval-corpus-forge py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: skills/eval-corpus-forge
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      # ruff/mypy pinned to the root dev-extra versions so skills lint/type identically.
      - run: pip install pytest pytest-cov "pyyaml>=6" "ruff==0.15.20" "mypy==2.1.0"
      # Lint the authored library, runner, and tests (the vendored validate_skill.py mirrors
      # the repo root copy and is intentionally excluded).
      - run: ruff check scripts/forge scripts/run_eval_corpus_forge.py tests
      - run: ruff format --check scripts/forge scripts/run_eval_corpus_forge.py tests
      # Type-check against the root mypy config (skills ship no config of their own).
      - run: mypy --config-file ../../pyproject.toml scripts/forge scripts/run_eval_corpus_forge.py
      # Unit + e2e tests with coverage gate on the forge library.
      - run: python -m pytest tests --cov=forge --cov-branch --cov-report=term-missing --cov-fail-under=95
      # The skill's own end-to-end self-check (structural + behavioral evals).
      - run: python scripts/validate_skill.py --skill . --tier structural,behavioral

  architecture-drift-guard:
    name: architecture-drift-guard py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: skills/architecture-drift-guard
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      # Isolated: only grimp + pyyaml + tooling — never the repo packages. The
      # skill must not import the code it polices. grimp is pinned for a
      # reproducible graph (an unpinned bump could shift edges and the gate).
      - run: pip install pytest pytest-cov "pyyaml>=6" "ruff==0.15.20" "mypy==2.1.0" "grimp==3.14"
      # Lint the authored library, runners, and tests (vendored validate_skill.py
      # mirrors the repo root copy and is intentionally excluded; fixtures carry
      # deliberate "unused" imports and are excluded via the skill ruff.toml).
      - run: ruff check scripts/adguard scripts/drift_check.py scripts/mermaid_gen.py tests
      - run: ruff format --check scripts/adguard scripts/drift_check.py scripts/mermaid_gen.py tests
      # Type-check against the root mypy config (skills ship no config of their own).
      - run: mypy --config-file ../../pyproject.toml scripts/adguard scripts/drift_check.py scripts/mermaid_gen.py
      # Unit + e2e tests with coverage gate on the adguard library.
      - run: python -m pytest tests --cov=adguard --cov-branch --cov-report=term-missing --cov-fail-under=95
      # The skill's own end-to-end self-check (structural + behavioral evals).
      - run: python scripts/validate_skill.py --skill . --tier structural,behavioral

  openai-judge:
    name: openai-judge py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: skills/openai-judge
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      # Isolated: the runner's --mock path and the unit tests (which inject a fake
      # eval_harness.judges) need no repo packages. Live mode is a thin, env-gated
      # wrapper validated by injection, not by a real SDK in CI.
      - run: pip install pytest pytest-cov "pyyaml>=6" "ruff==0.15.20" "mypy==2.1.0"
      # Lint the runner and tests (the vendored validate_skill.py mirrors the repo
      # root copy and is excluded via the skill ruff.toml).
      - run: ruff check scripts/run.py tests
      - run: ruff format --check scripts/run.py tests
      # Type-check against the root mypy config (skills ship no config of their own).
      - run: mypy --config-file ../../pyproject.toml scripts/run.py
      # Unit tests with coverage gate on the runner.
      - run: python -m pytest tests --cov=run --cov-branch --cov-report=term-missing --cov-fail-under=95
      # The skill's own end-to-end self-check (structural + behavioral evals).
      - run: python scripts/validate_skill.py --skill . --tier structural,behavioral

  model-bench:
    name: model-bench py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: skills/model-bench
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      # Unlike the other skills, model-bench wraps the harness, so it installs the
      # repo packages (the eval engine + agent_core for the campaign's Wilson stats).
      # The fixtures use echo targets, so no provider extras / credentials are needed.
      - run: pip install pytest pytest-cov "ruff==0.15.20" "mypy==2.1.0" -e ../.. -e ../../agent-core
      # Lint the runner and tests (vendored validate_skill.py excluded via ruff.toml).
      - run: ruff check scripts/run.py tests
      - run: ruff format --check scripts/run.py tests
      # Type-check against the root mypy config (skills ship no config of their own).
      - run: mypy --config-file ../../pyproject.toml scripts/run.py
      # Unit tests with coverage gate on the runner.
      - run: python -m pytest tests --cov=run --cov-branch --cov-report=term-missing --cov-fail-under=95
      # The skill's own end-to-end self-check (structural + behavioral evals).
      - run: python scripts/validate_skill.py --skill . --tier structural,behavioral

  project-setup:
    name: project-setup py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: skills/project-setup
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      # Pinned ruff/mypy so skills lint/type identically to the repo root. tomli only on 3.10
      # (3.11+ has stdlib tomllib). No repo packages: the generator only inspects files.
      - run: pip install pytest pytest-cov "ruff==0.15.20" "mypy==2.1.0" "tomli; python_version < '3.11'"
      - run: ruff check scripts/makegen scripts/gen_makefile.py tests
      - run: ruff format --check scripts/makegen scripts/gen_makefile.py tests
      - run: mypy --config-file ../../pyproject.toml scripts/makegen scripts/gen_makefile.py
      - run: python -m pytest tests --cov=makegen --cov=gen_makefile --cov-branch --cov-report=term-missing --cov-fail-under=95
      - run: python scripts/validate_skill.py --skill . --tier structural,behavioral

  quality-gate:
    name: quality-gate py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: skills/quality-gate
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      # tomli only on 3.10. The generated-gate execution tests shell out to bash + shellcheck,
      # both preinstalled on ubuntu-latest; shellcheck-guarded assertions therefore run here.
      - run: pip install pytest pytest-cov "ruff==0.15.20" "mypy==2.1.0" "tomli; python_version < '3.11'"
      - run: ruff check scripts/gategen scripts/gen_gate.py tests
      - run: ruff format --check scripts/gategen scripts/gen_gate.py tests
      - run: mypy --config-file ../../pyproject.toml scripts/gategen scripts/gen_gate.py
      - run: python -m pytest tests --cov=gategen --cov=gen_gate --cov-branch --cov-report=term-missing --cov-fail-under=95
      - run: python scripts/validate_skill.py --skill . --tier structural,behavioral

  deploy:
    name: deploy py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: skills/deploy
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      # No third-party runtime deps (config is flag-driven). bash + shellcheck are preinstalled
      # on ubuntu-latest, so the deploy-script safety-rail execution tests run here.
      - run: pip install pytest pytest-cov "ruff==0.15.20" "mypy==2.1.0"
      - run: ruff check scripts/deploygen scripts/gen_deploy.py tests
      - run: ruff format --check scripts/deploygen scripts/gen_deploy.py tests
      - run: mypy --config-file ../../pyproject.toml scripts/deploygen scripts/gen_deploy.py
      - run: python -m pytest tests --cov=deploygen --cov=gen_deploy --cov-branch --cov-report=term-missing --cov-fail-under=95
      - run: python scripts/validate_skill.py --skill . --tier structural,behavioral

  dataset-lint:
    name: dataset-lint py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: skills/dataset-lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: pip install pytest pytest-cov "ruff==0.15.20" "mypy==2.1.0"
      - run: ruff check scripts/lint_dataset.py tests
      - run: ruff format --check scripts/lint_dataset.py tests
      - run: mypy --config-file ../../pyproject.toml scripts/lint_dataset.py
      - run: python -m pytest tests --cov=lint_dataset --cov-branch --cov-report=term-missing --cov-fail-under=99
      - run: python scripts/validate_skill.py --skill . --tier structural,behavioral
