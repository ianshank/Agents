name: quality gates

on:
  push:
    branches: [main]
    paths:
      - "features.yaml"
      - "scripts/validations/**"
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/quality-gates.yml"
  pull_request:
    # 'labeled'/'unlabeled' so adding the eval-change-approved label re-runs the
    # protected-path guard and clears the check (default types don't fire on labels).
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - "features.yaml"
      - "scripts/validations/**"
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/quality-gates.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: quality-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    name: feature-validate + regression-gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
          fetch-depth: 0  # regression gate needs history to materialise the baseline
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip "setuptools>=68"
      - run: pip install -e "./agent-core"
      # archguard pulls grimp (pinned): F-011's airgap negative test shells out to
      # drift_check.py, which needs grimp to build the import graph. (F-011..F-015 add
      # flow-protocol/flow-corpus to sys.path themselves, so no editable install needed.)
      - run: pip install -e ".[dev,langfuse,openai,archguard,parquet]"
      # Feature ledger: schema + DAG + git provenance + tier-fast validation commands.
      - run: python scripts/validate.py --tier fast
      # Vendored skill-script copies must stay byte-identical to their canonical source.
      - name: Skill-script drift guard
        run: python scripts/check_skill_script_drift.py
      # Coverage gate for the quality-gate tooling itself (separate from the library's
      # eval_harness coverage, since scripts/ is omitted from that config).
      - name: Quality-gate tooling coverage (>=85%)
        run: >-
          python -m pytest
          tests/test_regression_gate.py tests/test_protected_paths.py tests/test_fix_loop.py
          tests/test_skill_script_drift.py tests/test_cli_logging.py
          tests/test_skill_marketplace.py tests/test_validation_scripts.py
          tests/test_merge_gate_context.py tests/test_record_audit_verdict.py
          tests/test_audit_issue_sync.py
          --override-ini addopts=""
          --cov=regression_gate --cov=eval_protected_paths
          --cov=check_protected_changes --cov=fix_loop
          --cov=check_skill_script_drift --cov=_cli
          --cov=skill_marketplace --cov=_common
          --cov=F_020 --cov=F_021 --cov=F_022 --cov=F_023
          --cov=merge_gate_context --cov=record_audit_verdict --cov=audit_issue_sync
          --cov=F_032 --cov=F_033 --cov=F_034 --cov=F_035
          --cov-branch --cov-config=/dev/null --cov-report=term-missing --cov-fail-under=85
      # Net-new lint/test regressions vs the PR base (or main on push). Blocks on net-new.
      - name: Regression gate
        run: >-
          python scripts/regression_gate.py
          --base-ref "origin/${{ github.base_ref || 'main' }}"
          --report-path regression_report.json
      - name: Upload regression report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: regression-report
          path: regression_report.json
          if-no-files-found: ignore

  eval-integrity:
    name: protected-path guard
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BASE_REF: origin/${{ github.base_ref }}
      PR_LABELS: ${{ toJson(github.event.pull_request.labels) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      # Pure-stdlib guard; no install needed. Flags eval-defining changes lacking approval.
      - run: python scripts/check_protected_changes.py
