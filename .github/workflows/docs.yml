name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "**/*.md"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "**/*.md"
      - "**/pyproject.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: mkdocs build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      # Install the declared docs extra so CI matches the repo (pyproject
      # [project.optional-dependencies].docs). Non-strict build on purpose — the corpus
      # cross-links to repo-root files outside docs_dir (see docs/plans/enterprise-docs-overhaul).
      - run: python -m pip install --upgrade pip && pip install -e '.[docs]'
        shell: bash
      - run: mkdocs build
        shell: bash
      - uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4
        with:
          name: docs-site
          path: site/
          retention-days: 7

  guards:
    name: doc-structure guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      # Blocking: every top-level component ships a README; every first-class package
      # declares Apache-2.0 license + project URLs. Inline (not scripts/*.py) so it does
      # not fall under the scripts/ coverage floor (F-031) or the protected tests/** guard.
      - name: Component READMEs + package license/urls present
        shell: bash
        run: |
          python - <<'PY'
          import pathlib, tomllib, sys
          fail = []
          components = ["src/eval_harness","agent-core","behavioral-regression","flow-corpus",
                        "flow-protocol","claude-foundation","skills","scripts","experiments",
                        "demo","config"]
          for c in components:
              if not pathlib.Path(c, "README.md").is_file():
                  fail.append(f"missing README: {c}/README.md")
          pyprojects = ["pyproject.toml","agent-core/pyproject.toml","behavioral-regression/pyproject.toml",
                        "flow-corpus/pyproject.toml","flow-protocol/pyproject.toml",
                        "claude-foundation/pyproject.toml"]
          for f in pyprojects:
              try:
                  proj = tomllib.loads(pathlib.Path(f).read_text()).get("project", {})
              except (OSError, tomllib.TOMLDecodeError) as exc:
                  fail.append(f"{f}: could not read/parse pyproject ({exc})")
                  continue
              if not proj:
                  fail.append(f"{f}: [project] table missing")
                  continue
              if "license" not in proj:
                  fail.append(f"{f}: [project].license missing")
              if "urls" not in proj:
                  fail.append(f"{f}: [project.urls] missing")
          if fail:
              print("DOC-GUARD FAILURES:")
              for x in fail: print("  -", x)
              sys.exit(1)
          print("doc-structure guards OK")
          PY

  links:
    name: relative-link check (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      # Advisory to start (soak mode): reports broken *relative* markdown links across the repo.
      # Promote to blocking once the pre-existing corpus link graph is clean.
      - name: Check relative links
        shell: bash
        run: |
          python - <<'PY'
          import pathlib, re
          link = re.compile(r'\[[^\]]+\]\(([^)]+)\)')
          broken = 0
          for md in pathlib.Path(".").rglob("*.md"):
              if any(p in md.parts for p in (".git","site","node_modules")):
                  continue
              for m in link.finditer(md.read_text(encoding="utf-8", errors="ignore")):
                  tgt = m.group(1).split("#")[0].strip()
                  if not tgt or tgt.startswith(("http://","https://","mailto:")):
                      continue
                  if not (md.parent / tgt).exists():
                      print(f"  BROKEN  {md}  ->  {tgt}"); broken += 1
          print(f"{broken} broken relative link(s)")
          PY

  markdownlint:
    name: markdownlint (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - name: Run markdownlint-cli2
        shell: bash
        run: npx --yes markdownlint-cli2 "**/*.md" "#node_modules" "#site"
