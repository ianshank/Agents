name: eval-harness CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/eval-harness-ci.yml"
      - "scripts/**"
      - "config/**"
      - "features.yaml"
      - "architecture.yaml"
      - "CHANGELOG.md"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/eval-harness-ci.yml"
      - "scripts/**"
      - "config/**"
      - "features.yaml"
      - "architecture.yaml"
      - "CHANGELOG.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: eval-harness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip "setuptools>=68"
      - run: pip install -e "./agent-core"
      - run: pip install -e ".[dev,langfuse,openai]"
      - run: ruff check src tests
      - run: ruff format --check src tests
      - run: mypy src/eval_harness
      - run: python -m pytest --cov --cov-report=term-missing
