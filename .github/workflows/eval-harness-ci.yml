name: eval-harness CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/eval-harness-ci.yml"
      - "scripts/**"
      - "config/**"
      - "features.yaml"
      - "architecture.yaml"
      - "CHANGELOG.md"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/eval-harness-ci.yml"
      - "scripts/**"
      - "config/**"
      - "features.yaml"
      - "architecture.yaml"
      - "CHANGELOG.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: eval-harness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip "setuptools>=68"
      - run: pip install -e "./agent-core"
      # autoevals is intentionally included: it is lightweight (chevron/jsonschema/polyleven/
      # pyyaml — no numpy/pandas) and its Heuristic scorers are pure-Python & offline-safe, so
      # the autoevals scorer bridge gets real coverage here. `braintrust` is deliberately NOT
      # installed — the `braintrust` sink degrades to a no-op when absent (mirrors phoenix).
      - run: pip install -e ".[dev,langfuse,openai,parquet,autoevals]"
      - run: ruff check src tests scripts
      - run: ruff format --check src tests scripts
      - run: mypy src/eval_harness
      - run: mypy scripts
      - run: mypy tests
      - run: python -m pytest --cov --cov-report=term-missing --cov-report=html
      # Publish the browsable HTML coverage report (one matrix leg is enough).
      - name: Upload HTML coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: coverage-html
          path: htmlcov/
          if-no-files-found: ignore
      # Operational scripts carry their own coverage gate (validations/F_* gates are
      # one-shot CI checks executed via features.yaml, not unit-test targets).
      - run: python -m pytest tests --cov=scripts --cov-config=scripts/.coveragerc --cov-report=term-missing
