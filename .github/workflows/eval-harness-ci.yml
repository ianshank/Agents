name: eval-harness CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/eval-harness-ci.yml"
      - ".github/actions/run-quality-gate/**"
      - "scripts/**"
      - "config/**"
      - "features.yaml"
      - "architecture.yaml"
      - "CHANGELOG.md"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/eval-harness-ci.yml"
      - ".github/actions/run-quality-gate/**"
      - "scripts/**"
      - "config/**"
      - "features.yaml"
      - "architecture.yaml"
      - "CHANGELOG.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: eval-harness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      # Delegate to the generated root gate so CI runs the exact same steps as local
      # `make check` -> ./scripts/quality-gate.sh all (ADR 0021 — CI gate delegation, POC).
      # This subsumes the previous inline ruff/format/mypy/pytest steps and the operational-
      # scripts coverage gate (the gate's do_extra runs the scripts pytest). autoevals stays
      # in the install: it is lightweight (no numpy/pandas) and offline-safe, so the autoevals
      # scorer bridge keeps real coverage; `braintrust` is deliberately absent (its sink
      # degrades to a no-op when absent, mirroring phoenix).
      - uses: ./.github/actions/run-quality-gate
        with:
          python-version: ${{ matrix.python-version }}
          install: pip install -e "./agent-core" && pip install -e ".[dev,langfuse,openai,parquet,autoevals]"
          check: make check
