schema_version: "1.0"

run:
  name: "nemotron-integration-test"
  seed: 42

dataset:
  type: inline
  params:
    items:
      - id: 1
        inputs: { question: "What is 2+2?" }
        expected: "4"

target:
  type: echo
  params:
    output_key: question

scorers:
  - type: llm_judge
    params:
      name: nemotron_accuracy
      threshold: 0.8

judge:
  type: openai
  params:
    model: "nvidia/nemotron-3-ultra-550b-a55b"
    base_url: "https://integrate.api.nvidia.com/v1"
    api_key: "${NVIDIA_API_KEY}"
    temperature: 1.0
    top_p: 0.95
    max_tokens: 4096
    system: "You are a fair and impartial judge. Respond ONLY with JSON: {\"score\": <0.0..1.0>, \"reasoning\": \"<brief string>\"}."
    extra_body:
      chat_template_kwargs:
        enable_thinking: true
      reasoning_budget: 8192

sinks:
  - type: console
    params: { verbose: true }
