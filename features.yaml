features:
  - id: "F-001"
    epic: "Foundation"
    name: "Harness initialized"
    description: "HARNESS_SPEC.md, features.yaml, schema, and validate.py exist and parse."
    category: "infrastructure"
    priority: "critical"
    status: "done"
    tier: "fast"
    verification:
      - "Core files present and parseable"
      - "validate.py runs and reports F-001 passing"
    validation_command: "python scripts/validations/F_001.py"
    implemented_in: "57f7cc2cbcaa3cf618c0b9ec6c5048da11da6796"
    depends_on: []
    notes: "Bootstrap feature — harness self-validates."

  - id: "F-002"
    epic: "Core"
    name: "OpenAI-compatible LLM judge"
    description: "OpenAIJudge class supporting NVIDIA Nemotron and local LM Studio via OpenAI-compatible API. Includes streaming reasoning extraction, robust JSON parsing, and exponential backoff retry."
    category: "functional"
    priority: "high"
    status: "done"
    tier: "fast"
    verification:
      - "OpenAIJudge initializes with model, base_url, api_key"
      - "Streaming reasoning_content captured in verdict"
      - "Markdown-wrapped JSON parsed correctly"
      - "Rate limit retry with exponential backoff"
    validation_command: "python scripts/validations/F_002.py"
    implemented_in: "57f7cc2cbcaa3cf618c0b9ec6c5048da11da6796"
    depends_on: ["F-001"]
    notes: "Supports NVIDIA Nemotron (with extra_body) and LM Studio (without)."

  - id: "F-003"
    epic: "Skills Framework"
    name: "Skill template and validator infrastructure"
    description: "Defines docs/SKILL_TEMPLATE.md, docs/SKILL_VALIDATION_TEMPLATE.md, scripts/validate_skill.py, and unit tests."
    category: "infrastructure"
    priority: "high"
    status: "done"
    tier: "fast"
    verification:
      - "SKILL_TEMPLATE.md exists and contains standard layout"
      - "SKILL_VALIDATION_TEMPLATE.md exists and defines evals/grading JSON format"
      - "validate_skill.py parses, validates skills structurally, and runs behavioral evals offline"
    validation_command: "python scripts/validations/F_003.py"
    implemented_in: "08849fdb157ef57a2a0acc2084db44fdad67d341"
    depends_on: ["F-001"]
    notes: "Skill validation is windows-safe and resource-isolated."

  - id: "F-004"
    epic: "Skills Framework"
    name: "First real skill (openai-judge) integrated"
    description: "Implements the openai-judge skill using the template. Validated structurally and behaviorally by validate_skill.py."
    category: "functional"
    priority: "high"
    status: "done"
    tier: "fast"
    verification:
      - "skills/openai-judge/SKILL.md exists and conforms to template"
      - "skills/openai-judge/scripts/run.py wraps OpenAIJudge correctly"
      - "validate_skill.py runs structural and behavioral checks successfully"
    validation_command: "python scripts/validations/F_004.py"
    implemented_in: "08849fdb157ef57a2a0acc2084db44fdad67d341"
    depends_on: ["F-003"]
    notes: "Demonstrates end-to-end self-validating skill execution."

  - id: "F-005"
    epic: "Tracing"
    name: "Langfuse Tracing and Hosted Evaluation Integration"
    description: "Instruments the evaluation engine and OpenAIJudge with Langfuse tracing, default cloud keys, and dataset run linking."
    category: "functional"
    priority: "high"
    status: "done"
    tier: "fast"
    verification:
      - "observe decorator traces engine run and run_one functions"
      - "SDKLangfuseClient uses default credentials at https://us.cloud.langfuse.com"
      - "Engine links trace to dataset run items via api.dataset_run_items.create"
      - "OpenAIJudge automatically wraps client with langfuse.openai.OpenAI"
    validation_command: "python scripts/validations/F_005.py"
    implemented_in: "08849fdb157ef57a2a0acc2084db44fdad67d341"
    depends_on: ["F-002"]
    notes: "Fallback to no-op tracing when langfuse library is absent."

  - id: "F-006"
    epic: "Quality Gate"
    name: "Regression gate (net-new failures vs HEAD)"
    description: "Worktree-baseline lint+offline-test diff; blocks only net-new findings/regressions, complementing the absolute coverage gate."
    category: "infrastructure"
    priority: "high"
    status: "done"
    tier: "fast"
    verification:
      - "Worktree baseline isolates HEAD (no untracked leakage)"
      - "Net-new lint violation blocks; pre-existing does not"
      - "Newly failing offline test blocks; class-based nodeids resolved"
      - "Lint identity is line-keyed; report conforms to JSON schema"
    validation_command: "python scripts/validations/F_006.py"
    implemented_in: "5911c2221b5e03cbc05579f529b28788ebf5f476"
    depends_on: ["F-001"]
    notes: "Offline deterministic suite only; never runs live-judge/Langfuse evals."

  - id: "F-007"
    epic: "Quality Gate"
    name: "Eval-integrity protected-path guard"
    description: "Single-source protected-path matcher plus a CI guard that flags PRs touching eval-defining files (features, config, gating, scorers, judges, validations, tests, CI) without an approval signal. Backed by CODEOWNERS."
    category: "infrastructure"
    priority: "high"
    status: "done"
    tier: "fast"
    verification:
      - "Matcher blocks every protected glob and allows implementation modules"
      - "Guard blocks protected changes without approval label/flag"
      - "Guard allows protected changes when approved, and implementation-only changes always"
    validation_command: "python scripts/validations/F_007.py"
    implemented_in: "5911c2221b5e03cbc05579f529b28788ebf5f476"
    depends_on: ["F-001"]
    notes: "Defense in depth: CODEOWNERS review + label-checked CI guard. Single source of truth in scripts/eval_protected_paths.py."

  - id: "F-008"
    epic: "Quality Gate"
    name: "Agentic auto-fix loop (design-only, disabled)"
    description: "Inert, unit-tested skeleton of a bounded auto-fix loop with an OS-layer scope guard that cannot write to protected eval-defining paths. Disabled by default; enabling is human-gated per ADR 0004."
    category: "infrastructure"
    priority: "medium"
    status: "deferred"
    tier: "fast"
    verification:
      - "FIX_ENABLED defaults to False; loop refuses to run while disabled or unguarded"
      - "ScopeGuard rejects writes to every protected glob"
      - "Loop escalates at max_cycles; verdict re-derived from clean re-evaluation"
      - "ADR 0004 documents the design and the human enable-checklist"
    validation_command: "python scripts/validations/F_008.py"
    depends_on: ["F-007"]
    notes: "Deferred: ADR 0004 human checklist pending. Will be activated after audit label accumulation strategy is defined."

  - id: "F-009"
    epic: "Skills Framework"
    name: "Architecture drift-guard skill + dogfood CI gate"
    description: "Self-contained skills/architecture-drift-guard (grimp + pyyaml only) that diffs a codebase's actual import graph against a declared C4 component manifest and renders a Mermaid C4 diagram. Dogfooded on this repo via architecture.yaml/architecture.mmd and a deterministic drift+freshness CI gate over eval_harness and agent_core."
    category: "infrastructure"
    priority: "high"
    status: "done"
    tier: "fast"
    verification:
      - "validate_skill.py passes structural+behavioral for skills/architecture-drift-guard"
      - "drift_check.py exits 1 on an undocumented component edge, 0 when the manifest matches"
      - "mermaid_gen.py --check exits 1 when architecture.mmd is stale, 0 when fresh"
      - "drift gate is deterministic code with no model in the decision path; grimp isolated in adguard/extractor.py"
    validation_command: "python scripts/validations/F_009.py"
    implemented_in: "6e00625f875f11bf4e11b657631b92ed6225814c"
    depends_on: ["F-003", "F-004"]
    notes: "Self-contained: the skill never imports the code it polices. The dogfood manifest's dependencies were seeded from --emit-actual and reviewed (core depends on nothing; deps flow inward)."

  - id: "F-010"
    epic: "Quality Gate"
    name: "Calibrated auto-merge gate (opt-in, default-off)"
    description: "agent_core merge-gate subsystem: deterministic decide() (mechanical ground truth -> protected-path escalate -> risk-derived tau + calibrator health + Wilson floor), an append-only OutcomeStore with per-domain models built from HUMAN_AUDIT records only, a passive outcome labeller, an unbiased audit sampler, and a CI entrypoint with a stable exit-code contract. Wired via an opt-in, default-off workflow."
    category: "infrastructure"
    priority: "medium"
    status: "done"
    tier: "fast"
    verification:
      - "decide() REJECTs on mechanical failure and ESCALATEs protected paths regardless of confidence"
      - "tau is risk-derived on a held-out fold; only HUMAN_AUDIT labels feed tau/health; cold start escalates"
      - "merge_gate_ci exit codes 0/10/20 map to auto-merge/escalate/reject; decisions are audit-logged"
      - "auto-merge is gated behind ENABLE_CALIBRATED_AUTOMERGE (default off); ADR 0005 documents the enable-checklist"
      - "merge-time seeding (merge_seed.py) writes the initial pending OutcomeRecord (idempotent, default-off in merge_gate_ci) so the labeller/audit sampler can resolve it; closes the ADR 0005 seam"
    validation_command: "python scripts/validations/F_010.py"
    implemented_in: "22c3b6e0718ddbc233b8db73e0923e31b1f8cc02"
    depends_on: ["F-007"]
    notes: "DESIGN + opt-in CI, default-off. Pure subsystem under agent_core with strict mypy + 95% coverage; the merge workflow auto-merges nothing until a human enables it and audit data accumulates."

  - id: "F-011"
    epic: "Flow Calibration Corpus"
    name: "flow_protocol contract + structural airgap"
    description: "New flow-protocol package: Pydantic v2 frozen FlowResult/OracleResult/ConfidenceChannel contract with semver + migration chain, the ONLY shared surface between the corpus and the harness. The airgap (flow_corpus must never import eval_harness, and vice versa) is enforced deterministically by the existing grimp architecture-drift gate via new components/edges in architecture.yaml."
    category: "infrastructure"
    priority: "high"
    status: "done"
    tier: "fast"
    verification:
      - "FlowResult/OracleResult round-trip via JSON; raw_confidence optional; verdict None=indeterminate"
      - "drift gate passes clean (exit 0) with flow_protocol/flow_corpus declared"
      - "NEGATIVE: a forbidden flow_corpus->eval_harness import trips drift_check.py (exit 1), proving the airgap fires"
      - "architecture.mmd regenerated and fresh"
    validation_command: "python scripts/validations/F_011.py"
    implemented_in: "8a73716de0d22a8757cf1918c22b9c4d964663c1"
    depends_on: ["F-009"]
    notes: "Airgap-bound critical path (Phase 0). flow-protocol carries pydantic only; flow_corpus depends on flow_protocol + agent_core, never eval_harness."

  - id: "F-012"
    epic: "Flow Calibration Corpus"
    name: "Two-way version pin + forced-mismatch negative test"
    description: "flow_corpus pins the flow_protocol contract version and the agent_core (harness) version it was built against; verify_pins() raises PinMismatch on any live/pinned divergence. In a single repo this is a deliberate-bump tripwire rather than a true cross-repo skew guard."
    category: "infrastructure"
    priority: "high"
    status: "done"
    tier: "fast"
    verification:
      - "verify_pins() passes when live flow_protocol/agent_core versions match the pins"
      - "NEGATIVE: a forced protocol-version mismatch raises PinMismatch (build fails)"
      - "NEGATIVE: a forced harness-version mismatch raises PinMismatch (build fails)"
    validation_command: "python scripts/validations/F_012.py"
    implemented_in: "8a73716de0d22a8757cf1918c22b9c4d964663c1"
    depends_on: ["F-011"]
    notes: "Phase 0. The negative cases are the point: a wrong pin must fail the build, else the skew tripwire is dead."

  - id: "F-013"
    epic: "Flow Calibration Corpus"
    name: "Phase 1: baseline+MCTS on a populated SDLC oracle domain, canary, oracle κ-gate"
    description: "Policy-injected specimens (baseline control + MCTS) run a declared-N SDLC task suite judged by a deterministic property oracle; outcomes are keyed by (agent_version, domain) with the task excluded from the key. Brier reliability is computed via the agent_core Murphy decomposition (primary metric). A discrimination canary (gold vs no-op) is separated by a Wilson-bounded pass-rate margin, and the oracle κ-gate (co-determinate pairs only, power-aware) blocks a disagreeing oracle."
    category: "functional"
    priority: "high"
    status: "done"
    tier: "fast"
    verification:
      - "SDLC suite ships the declared N instances; indeterminate rate within the derived cap"
      - "baseline (mandatory control) + MCTS registered; version key excludes task, includes config"
      - "Brier reliability computed via brier_decomposition; outcomes keyed by (agent_version, domain)"
      - "canary separates gold from no-op by >= min_canary_margin (Wilson bounds, not AUROC)"
      - "oracle κ-gate passes an agreeing oracle and blocks a disagreeing one (co-determinate, power-aware)"
    validation_command: "python scripts/validations/F_013.py"
    implemented_in: "27004a9e869953b385b24bd0f1a6c3d0ec1879d9"
    depends_on: ["F-011", "F-012"]
    notes: "Phase 1. MockPolicy seam keeps flows deterministic/offline; reliability below power_min_sample is directional-only and cannot gate. Agent-core bumped to 1.3.0 for the OutcomeRecord.agent_version keying field (additive, backwards-compatible)."

  - id: "F-014"
    epic: "Flow Calibration Corpus"
    name: "Phase 2: ReAct type-holdout + honest instance/type holdout + confidence cross-check"
    description: "ReAct is introduced as a type-holdout flow. A single-authority HoldoutManager reports instance-holdout (seen flow types, unseen tasks — the primary calibration number) and type-holdout (unseen flow type — generalization) as SEPARATE numbers, with an extrapolation-fraction caveat on the type-holdout. A power helper marks sub-power slices directional-only. The confidence cross-check ablates raw confidence against a flow-type indicator on a held-out partition and tests significance with a seeded bootstrap CI on the AUROC delta (DeLong deferred)."
    category: "functional"
    priority: "high"
    status: "done"
    tier: "fast"
    verification:
      - "instance-holdout and type-holdout reported separately, never merged"
      - "type-holdout carries an extrapolation-fraction caveat (held-out confidences outside seen support)"
      - "a sub-power slice is directional-only and cannot gate"
      - "confidence cross-check returns a signed, bootstrap-significance-tested result vs a flow-type indicator"
    validation_command: "python scripts/validations/F_014.py"
    implemented_in: "4b1398bb69de9560310816212551f9dcfac4e971"
    depends_on: ["F-013"]
    notes: "Phase 2. Single split authority (HoldoutManager owns the golden._bucket partition; the model builder does not re-split). DeLong deferred to post-MVP in favour of the bootstrap."

  - id: "F-015"
    epic: "Flow Calibration Corpus"
    name: "Phase 4 (MVP slice): mutation engine + holdout rotation + reliability stability"
    description: "A seeded mutation engine perturbs the SDLC suite into an instance distribution (difficulty/tool/noise), preserving task identity and — crucially — NOT re-keying the agent (task is the population axis, excluded from the key). A RotationManager rotates the held-out instance partition across k folds and gates on the spread of the primary metric (Brier reliability) staying within the configured stability threshold."
    category: "functional"
    priority: "high"
    status: "done"
    tier: "fast"
    verification:
      - "mutation engine is deterministic and preserves task identity (solution_space/correct)"
      - "task perturbation does NOT re-key the agent; an impl/config change DOES re-key"
      - "holdout rotation produces >= k folds and a Brier-reliability stability spread gated by threshold"
    validation_command: "python scripts/validations/F_015.py"
    implemented_in: "4b1398bb69de9560310816212551f9dcfac4e971"
    depends_on: ["F-013", "F-014"]
    notes: "Phase 4 rotation slice — completes the MVP (Phases 0-2 + Phase 4 rotation). Phases 3/5/6 (metamorphic oracle, taxonomy, trust decay) remain as follow-ups."

  - id: "F-016"
    epic: "Behavioral Regression Detection"
    name: "Calibrated behavioral-regression detector (offline, ship/hold/escalate)"
    description: "A self-contained sibling package (behavioral-regression) that answers a contested behavioral question — did model v2 drift (e.g. more sycophantic) vs v1? — with calibrated confidence. A seeded synthetic paired-response generator and a deliberately-imperfect contested judge feed an oracle-kappa validation step (the judge is advisory until it clears min_judge_kappa with enough power), a calibrated detector (Wilson + bootstrap delta CI, Brier reliability, an explicit can't-tell bucket), a discrimination canary (inject a known regression + known null and assert separation), and a SHIP/HOLD/ESCALATE gate that fails safe to ESCALATE. Reuses agent_core calibration/cohen_kappa and flow_corpus bootstrap_delta_ci/validate_oracle/canary primitives rather than reimplementing them. Emits a deterministic JSON report + a self-contained HTML reliability diagram; an optional Streamlit shell and an optional live AnthropicJudge (eval_harness) are gated behind extras. Offline and byte-reproducible from (BRConfig, seed)."
    category: "functional"
    priority: "high"
    status: "done"
    tier: "fast"
    verification:
      - "generation, judging, and the full run are deterministic and offline (byte-identical to_dict() for a fixed (BRConfig, seed); no network on the validation path)"
      - "an unvalidated judge (kappa below min_judge_kappa, or below power) is advisory only and cannot gate"
      - "the detector separates a known-regression arm from a known-null arm (canary), and reports a can't-tell bucket when the delta CI includes zero or the sample is below power"
      - "the gate fails safe to ESCALATE on any untrusted apparatus (canary not separated, judge not validated, or can't-tell); HOLDs a real regression; SHIPs only validated, separable, below-risk changes"
      - "all thresholds live on BRConfig (no hard-coded values in decision logic); 95% branch coverage; strict mypy"
    validation_command: "python scripts/validations/F_016.py"
    implemented_in: "08b1b8bf48175e40fee50560c2828c913dab3f05"
    depends_on: ["F-005", "F-013"]
    notes: "New sibling package behavioral-regression depending on agent_core + flow_protocol + flow_corpus (acyclic; never imports eval_harness). The optional live AnthropicJudge lives in eval_harness.judges behind the [anthropic] extra; the sibling stays offline. See ADR 0006."

  - id: "F-018"
    epic: "Performance"
    name: "Parallel item execution"
    description: "ThreadPoolExecutor-based parallel item evaluation with configurable max_workers. Sequential fallback at max_workers=1 preserves identical behaviour to the legacy engine. Per-item deterministic RNG, submission-order result collection, structured per-thread logging, and fail_fast executor shutdown."
    category: "functional"
    priority: "high"
    status: "done"
    tier: "fast"
    verification:
      - "Offline pytest"
      - "Identical sequential/parallel aggregates"
    validation_command: "python scripts/validations/F_018.py"
    implemented_in: "e9f2ad8d8a41a228945b6c31cca7ed0c8322ee38"
    depends_on: ["F-001"]
    notes: "See ADR 0008. Langfuse per-item trace linking unavailable in parallel mode (graceful degradation). Scorers must be stateless or thread-safe."

  - id: "F-017"
    epic: "Foundation"
    name: "Dynamic versioning"
    description: "Replace hardcoded __version__ with importlib.metadata dynamic lookup, falling back to '0.0.0-dev' for editable/source installs. Decouples SCHEMA_VERSION from package version."
    category: "infrastructure"
    priority: "medium"
    status: "done"
    tier: "fast"
    verification:
      - "version.py uses importlib.metadata.version(), not a hardcoded string"
      - "__version__ is importable from eval_harness and eval_harness.version"
      - "SCHEMA_VERSION remains '1.0' and is re-exported from __init__.py"
      - "_DIST_NAME matches the distribution name in pyproject.toml"
      - "Fallback to '0.0.0-dev' when package is not pip-installed"
    validation_command: "python scripts/validations/F_017.py"
    implemented_in: "e9f2ad8d8a41a228945b6c31cca7ed0c8322ee38"
    depends_on: ["F-001"]
    notes: "Backwards compatible — all existing imports of __version__ and SCHEMA_VERSION continue to work."

  - id: "F-019"
    epic: "Core"
    name: "CSV/Parquet dataset sources"
    description: "Adds CsvDataset (registered as 'csv' with alias 'csv_file') and ParquetDataset (registered as 'parquet' with alias 'parquet_file') with configurable column mappings, path confinement via DATA_ROOT, and BOM-safe encoding."
    category: "functional"
    priority: "high"
    status: "done"
    tier: "fast"
    verification:
      - "CsvDataset loads CSV files with default and custom column mappings"
      - "ParquetDataset loads Parquet files via lazy pyarrow import"
      - "_validate_dataset_path rejects path traversal and enforces DATA_ROOT"
      - "Both sources registered with primary name and alias"
      - "Existing InlineDataset, JsonlDataset, LangfuseDataset unchanged"
    validation_command: "python scripts/validations/F_019.py"
    implemented_in: "e9f2ad8d8a41a228945b6c31cca7ed0c8322ee38"
    depends_on: ["F-001"]
    notes: "pyarrow is an optional dependency — ParquetDataset raises a descriptive ImportError if missing."

  - id: "F-023"
    epic: "Skills Framework"
    name: "Skill marketplace registry with versioned SKILL.md validation"
    description: "Adds a centralized, schema-validated skill registry (skills/marketplace.yaml + marketplace.schema.json) and a scripts/skill_marketplace.py CLI (validate/verify/list). The CLI reuses scripts/validate_skill.py read-only (parse_frontmatter, check_structural) and enforces marketplace rules on top: a semver 'version' in each SKILL.md frontmatter that matches the registry entry, matching and unique names, and a real skill directory. Existing skills gain an additive 'version:' frontmatter key."
    category: "infrastructure"
    priority: "medium"
    status: "done"
    tier: "fast"
    verification:
      - "skills/marketplace.yaml parses and validates against marketplace.schema.json"
      - "every registered skill exists and passes validate_skill.check_structural"
      - "SKILL.md frontmatter 'version' is enforced as semver and must match the registry entry"
      - "duplicate names, name/version mismatches, and missing paths are reported"
      - "validate_skill default mode is unchanged (no 'version' requirement); the drift guard stays green"
    validation_command: "python scripts/validations/F_023.py"
    implemented_in: "e1d6e48fa0a5a4b0152f15feb6b880868b2fc262"
    depends_on: ["F-003"]
    notes: "validate_skill.py is reused read-only (not edited), so the skill-script drift guard is unaffected. Semver enforcement lives in skill_marketplace.py. Tooling under scripts/ (93% branch coverage, above the 85% tooling floor)."

  - id: "F-022"
    epic: "Judge"
    name: "Judge budget cap (per-run token/request budget)"
    description: "Adds BudgetedJudge + build_budgeted_judge in agent_core_adapter that wrap a Judge with a cumulative per-run cost cap enforced via agent_core.BudgetLedger. Each evaluate reserves cost_per_call before delegating, under a lock, so the cap holds under parallel execution; on exhaustion it raises BudgetExceededError or returns a sentinel verdict per on_exceeded. Wired in EvalEngine.from_config behind the optional JudgeBudgetConfig (default-off)."
    category: "non-functional"
    priority: "high"
    status: "done"
    tier: "fast"
    verification:
      - "BudgetedJudge admits calls under the cap and raises BudgetExceededError once exhausted"
      - "ledger built with reserve_fraction=0 so usable budget equals the configured cap"
      - "on_exceeded='skip' returns a sentinel verdict instead of raising"
      - "parallel execution never exceeds the cap and never retroactively rejects an admitted call"
      - "judge is wrapped only when JudgeBudgetConfig.enabled; absent/disabled leaves the judge and offline deps unchanged"
    validation_command: "python scripts/validations/F_022.py"
    implemented_in: "82a60b4bb87407456cefd6fd39c698cb79ab6dda"
    depends_on: ["F-002"]
    notes: "Reuses agent_core.BudgetLedger (no reimplementation). Cumulative budget cap, not time-windowed rate limiting (deferred). No live token signal exists at the judge call site, so cost_per_call is a configured per-call estimate. agent_core imported lazily; the offline path stays dependency-free. SCHEMA_VERSION unchanged (judge_budget is optional)."

  - id: "F-020"
    epic: "Scoring"
    name: "Weighted / ensemble scoring"
    description: "Adds CompositeScorer (registered as 'weighted' with aliases 'composite'/'ensemble') that owns child scorers built from the registry and combines their values as a weight-normalised mean into one ScoreResult, recording the per-child breakdown in ScoreResult.metadata. RunResult.to_dict now serialises score metadata so the breakdown reaches the JSON/HTML sinks."
    category: "functional"
    priority: "high"
    status: "done"
    tier: "fast"
    verification:
      - "weighted scorer registered with aliases composite/ensemble"
      - "weighted mean of child values computed from configured weights (default 1.0)"
      - "per-child breakdown stored in ScoreResult.metadata['components']"
      - "pass_threshold drives the composite passed flag; absent threshold aggregates child verdicts"
      - "composite breakdown survives RunResult.to_dict() round-trip; existing scorers unchanged"
    validation_command: "python scripts/validations/F_020.py"
    implemented_in: "7e4f515ff1046f3951fe21d3b1378a7f20a6428a"
    depends_on: ["F-001"]
    notes: "Children built once at construction via SCORERS.create; an llm_judge child still receives ctx.judge. Configured via ComponentSpec params; no config-schema change, SCHEMA_VERSION unchanged. to_dict gains an additive 'metadata' key per score (backwards-compatible)."

  - id: "F-021"
    epic: "Reporting"
    name: "HTML dashboard export sink"
    description: "Adds HtmlFileSink (registered as 'html_file' with alias 'html') that renders a RunResult into a single self-contained, deterministic HTML report (inline CSS + inline SVG, no external assets or CDN). Reuses the dependency-free string-built rendering approach from behavioral-regression's report.to_html."
    category: "functional"
    priority: "medium"
    status: "done"
    tier: "fast"
    verification:
      - "html_file sink registered with alias 'html'"
      - "emit writes a single self-contained HTML file with no external script/link/@import/url(http) references"
