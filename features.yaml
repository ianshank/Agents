  - id: "F-032"
    epic: "Quality Gate"
    name: "Outcome-store persistence seam (store_sync data branch)"
    description: "Closes the seam ADR 0005 left open: the merge-gate outcome store lived in ephemeral runner workspaces, so records seeded in run N were gone in run N+1 and every domain stayed in cold-start ESCALATE forever. agent_core.store_sync (ADR 0018) syncs the local JSONL store with the dedicated merge-gate-data branch: canonical deterministic merge (full-record-JSON dedupe + total-order sort, because OutcomeStore.resolved() is file-order dependent), fetch-gated FETCH_HEAD reads (CI checkouts leave a stale one), plumbing commits that never touch the worktree, lazy orphan-branch bootstrap, and a bounded retry-with-backoff push loop for concurrent writers. Injectable GitRunner/Sleeper Protocol seams; StoreSyncConfig carries every tunable."
    category: "infrastructure"
    priority: "high"
    status: "done"
    tier: "fast"
    verification:
      - "A record appended in workflow run N is readable in run N+1 (real bare-remote integration test; no live GitHub)"
      - "Two concurrent appends both survive via the retry-rebase loop (competitor-clone race test asserts attempts and backoff sequence via a recording sleeper)"
      - "HUMAN_AUDIT records are never dropped by sync and still win in resolved() (Hypothesis property test)"
      - "Any interleaving of the same record sets yields a byte-identical store AND an identical resolved() view (Hypothesis; canonical total order)"
      - "F_032.py: every store-referencing workflow invokes store_sync; no pull_request-triggered workflow pushes the store; agent-core keeps zero runtime deps"
    validation_command: "python scripts/validations/F_032.py"
    implemented_in: "6541ba8ec3a477a0348809a791194276107330c1"
    depends_on: []
    notes: "ADR 0018 records the backend choice (data branch over cache/artifacts/S3), GITHUB_TOKEN-only credentials, retry-loop-only concurrency (a shared concurrency group would silently drop queued writer runs), and the at-most-one-passive-label ordering assumption."

